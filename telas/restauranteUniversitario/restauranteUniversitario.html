<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Universitário</title>

    <link rel="stylesheet" href="restauranteUniversitario.css">
</head>

<body>

    <section class="tela">

        <!-- HEADER -->
        <header class="header-estudante">

            <button class="btn-icon"
                onclick="window.location.href='../../telas/telaInicial/telainicial.html'">

                <img src="../../icons/login-voltar.svg" alt="Voltar">
            </button>

            <img src="../../icons/logo-portal.svg"
                alt="Logo"
                class="logo-header">

            <div class="avatar-placeholder">
                👤
            </div>

        </header>

        <!-- CONTEÚDO -->
        <div class="conteudo-centralizado">

            <h2 class="titulo-secao">
                Restaurante Universitário
            </h2>

            <!-- CARD -->
            <div class="card-ru">

                <!-- SALDO -->
                <p class="saldo-label">
                    Saldo disponível
                </p>

                <div class="saldo-value">
                    R$ 10,00
                </div>

                <!-- QR CODE -->
                <div class="qr-wrap">

                    <img
                        src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=PortalAluno"
                        alt="QR Code"
                    >

                </div>

                <!-- MATRÍCULA -->
                <p class="matricula">
                    20250300029
                </p>

                <!-- BOTÃO -->
                <button class="btn-compra"
                    onclick="window.location.href='pagamento1/index.html'">

                    + Adicionar saldo

                </button>

                <!-- AÇÕES -->
                <div class="actions">

                    <button class="btn-sec"
                        onclick="window.location.href='../../telas/restauranteUniversitario/historico/index.html'">

                        Histórico

                    </button>

                    <button class="btn-sec"
                        onclick="window.location.href='../../telas/restauranteUniversitario/cardapio/index.html'">

                        Cardápio

                    </button>

                </div>

            </div>

        </div>

    </section>

</body>
</html>
