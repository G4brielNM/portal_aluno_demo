<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">


        <section id="tela-login" class="tela">
            
            <img src="icons/logo-portal.svg" alt="Portal do Aluno" class="logo-app">
            <h3 class="subtitulo-login">ÁREA DE LOGIN</h3>

            <div class="form-login">
                <label>CPF</label>
                <input type="text" class="input-field">

                <label>Senha</label>
                <div class="senha-container">
                    <input type="password" class="input-field">
                    <span class="icone-olho">👁</span>
                </div>

                <label class="checkbox-label">
                    <input type="checkbox"> Manter-me conectado
                </label>
                      
                <button class="btn-entrar" onclick="window.location.href='telas/telaInicial/telainicial.html'">Entrar</button>
                
                <a href="#" class="link-esqueci">Esqueci minha senha</a>
                
            </div>

            <div class="novo-aluno-container">
                <p>Novo aluno?</p>
                <button class="btn-entre-aqui">Entre aqui</button>
            </div>
        </section>

    </div>


  
</body>
</html>
